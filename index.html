<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0088cc" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>شركة الشفاء لتوزيع الأدوية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
      :root {
        /* 🎨 الألوان */
        --chat--color--primary: #6C5CE7; /* بنفسجي */
        --chat--color--primary-shade-50: #5a4bd6;
        --chat--color--primary--shade-100: #4c3ec4;

        --chat--color--secondary: #00B894; /* أخضر */
        --chat--color-secondary-shade-50: #019875;

        --chat--color-white: #ffffff;
        --chat--color-light: #f8f9fc;
        --chat--color-dark: #1e1e2f;

        /* 📐 الشكل العام */
        --chat--border-radius: 14px;
        --chat--spacing: 1rem;
        --chat--font-family: 'Cairo', sans-serif;

        /* 🪟 نافذة الشات */
        --chat--window--width: 380px;
        --chat--window--height: 550px;
        --chat--window--border-radius: 16px;

        /* 🧠 الهيدر */
        --chat--header--background: linear-gradient(135deg, #6C5CE7, #00B894);
        --chat--header--color: #fff;
        --chat--heading--font-size: 1.4em;

        /* 💬 الرسائل */
        --chat--message--border-radius: 12px;

        --chat--message--bot--background: #ffffff;
        --chat--message--bot--color: #333;

        --chat--message--user--background: #6C5CE7;
        --chat--message--user--color: #fff;

        /* 🔘 زر الفتح */
        --chat--toggle--background: linear-gradient(135deg, #6C5CE7, #00B894);
        --chat--toggle--hover--background: #5a4bd6;
        --chat--toggle--size: 60px;

        /* ✏️ الإدخال */
        --chat--input--border-radius: 10px;
      }

      /* 📝 اتجاه عربي */
      .n8n-chat {
        direction: rtl;
      }
      
      /* إجبار البوت على أن يكون ثابتاً تماماً في أسفل الشاشة */
      .chat-wrapper-fix {
        padding-bottom: 0px !important;
        margin-bottom: 0px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://n8n.srv1206282.hstgr.cloud/webhook/184a4556-6940-42a5-aa52-9cc064b12e52/chat',
        mode: 'window',
        defaultLanguage: 'ar',
        showWelcomeScreen: true,
        initialMessages: [
          'مرحباً بك في سولتير - اليمن ✨',
          'مساعدك الذكي في خدمتك 🤖',
          'كيف أقدر أساعدك اليوم؟'
        ],
        i18n: {
          ar: {
            title: '🛍️ سولتير - اليمن',
            subtitle: 'متجرك الإلكتروني لكل ما تحتاجه',
            footer: '',
            getStarted: 'ابدأ المحادثة',
            inputPlaceholder: 'اكتب سؤالك هنا...',
          },
        },
        metadata: {
          store: 'Soltier Yemen'
        }
      });

      // 강제 스크립트 (Forced Script to handle n8n chat widget styling which ignores standard CSS)
      const fixChatPosition = () => {
        const isMobile = window.innerWidth <= 768;
        const chatRoots = [
          ...document.querySelectorAll('.n8n-chat-container, .n8n-chat-toggle, [class*="n8n-"]'),
          ...document.querySelectorAll('div[data-v-app]') // sometimes Vue apps use this
        ];
        
        chatRoots.forEach(el => {
          if (el.style.position === 'fixed' || getComputedStyle(el).position === 'fixed' || el.classList.contains('chat-wrapper-fix')) {
            el.classList.add('chat-wrapper-fix');
            // Force override it
            if(isMobile) {
              el.style.setProperty('bottom', '74px', 'important'); /* Lowered slightly */
              el.style.setProperty('right', '12px', 'important');
              el.style.setProperty('transform', 'scale(0.70)', 'important'); /* Made icon smaller */
              el.style.setProperty('transform-origin', 'bottom right', 'important');
            } else {
              el.style.setProperty('bottom', '24px', 'important');
              el.style.setProperty('right', '24px', 'important');
              el.style.setProperty('transform', 'scale(1)', 'important');
            }
          }
        });
      };

      // Watch for the chat widget to be added to the DOM and apply styles
      const observer = new MutationObserver(() => {
        fixChatPosition();
      });
      observer.observe(document.body, { childList: true, subtree: true });
      window.addEventListener('resize', fixChatPosition);

      // Close chat when clicking outside
      const handleChatClickOutside = (e) => {
        const chatWindow = document.querySelector('.n8n-chat-window, .n8n-chat-container');
        const chatToggle = document.querySelector('.n8n-chat-toggle');
        
        if (chatWindow && getComputedStyle(chatWindow).display !== 'none' && chatWindow.style.opacity !== '0') {
          const path = e.composedPath ? e.composedPath() : [];
          const clickedInsideChat = path.includes(chatWindow) || chatWindow.contains(e.target);
          const clickedOnToggle = chatToggle && (path.includes(chatToggle) || chatToggle.contains(e.target));
          
          if (!clickedInsideChat && !clickedOnToggle) {
             const closeBtn = document.querySelector('.n8n-chat-header button');
             if (closeBtn) {
               closeBtn.click();
             } else if (chatToggle) {
               chatToggle.click();
             }
          }
        }
      };
      document.addEventListener('mousedown', handleChatClickOutside);
      document.addEventListener('touchstart', handleChatClickOutside, { passive: true });
    </script>
  </body>
</html>
